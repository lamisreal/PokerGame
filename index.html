<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎮 Game LAS House</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Roboto:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at top, #1a0a2e 0%, #0d0d1a 60%, #000 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Roboto', sans-serif;
      overflow: hidden;
    }

    /* ── Animated stars background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,.55) 0%, transparent 100%),
        radial-gradient(1px 1px at 40% 70%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 65% 15%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,.35) 0%, transparent 100%),
        radial-gradient(2px 2px at 30% 90%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 72% 85%, rgba(255,255,255,.45) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 50% 40%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 60%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 30%, rgba(255,255,255,.5) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    .main-header {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 48px;
    }
    .main-header h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffd700 0%, #ffaa00 40%, #ff6600 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      filter: drop-shadow(0 0 18px rgba(255,170,0,.6));
    }
    .main-header p {
      margin-top: 10px;
      color: rgba(255,255,255,.5);
      font-size: .95rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ── Cards grid ── */
    .game-grid {
      position: relative;
      z-index: 1;
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0 24px;
    }

    /* ── Individual game card ── */
    .game-card {
      width: 300px;
      border-radius: 24px;
      overflow: hidden;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      transition: transform .35s cubic-bezier(.34,1.56,.64,1), box-shadow .35s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
    }
    .game-card:hover {
      transform: translateY(-12px) scale(1.03);
    }

    /* ── Tiến Lên card ── */
    .card-tienlen {
      background: linear-gradient(160deg, #0d5e1d 0%, #0a7a26 40%, #04b53a 100%);
      box-shadow: 0 8px 32px rgba(4,181,58,.35);
      border: 2px solid rgba(4,181,58,.5);
    }
    .card-tienlen:hover {
      box-shadow: 0 20px 60px rgba(4,181,58,.55);
    }

    /* ── Poker card ── */
    .card-poker {
      background: linear-gradient(160deg, #3d0000 0%, #7a1000 40%, #c42000 100%);
      box-shadow: 0 8px 32px rgba(196,32,0,.35);
      border: 2px solid rgba(196,32,0,.5);
    }
    .card-poker:hover {
      box-shadow: 0 20px 60px rgba(220,60,0,.6);
    }

    /* ── Thumbnail area ── */
    .card-thumb {
      width: 100%;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .card-thumb::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60px;
      background: linear-gradient(to top, rgba(0,0,0,.5), transparent);
    }

    /* ── Tiến Lên thumb visual ── */
    .tienlen-visual {
      display: flex;
      gap: 6px;
      align-items: flex-end;
    }
    .tl-card {
      width: 52px;
      height: 76px;
      background: #fff;
      border-radius: 7px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      font-weight: 900;
      line-height: 1;
      box-shadow: 3px 3px 8px rgba(0,0,0,.5);
      color: #111;
      transition: transform .2s;
      position: relative;
    }
    .tl-card:nth-child(1) { transform: rotate(-8deg) translateY(8px); }
    .tl-card:nth-child(2) { transform: rotate(-3deg) translateY(3px); }
    .tl-card:nth-child(3) { transform: rotate(2deg) translateY(0px); }
    .tl-card:nth-child(4) { transform: rotate(7deg) translateY(4px); }
    .tl-card .suit { font-size: .75rem; margin-top: 2px; }
    .tl-card.red { color: #d32f2f; }
    .game-card:hover .tl-card:nth-child(1) { transform: rotate(-12deg) translateY(14px); }
    .game-card:hover .tl-card:nth-child(2) { transform: rotate(-4deg) translateY(5px); }
    .game-card:hover .tl-card:nth-child(3) { transform: rotate(4deg) translateY(2px); }
    .game-card:hover .tl-card:nth-child(4) { transform: rotate(12deg) translateY(8px); }

    /* ── Poker thumb visual ── */
    .poker-visual {
      position: relative;
      width: 120px;
      height: 120px;
    }
    .pk-card {
      width: 66px;
      height: 90px;
      background: #fff;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 900;
      color: #d32020;
      position: absolute;
      box-shadow: 4px 4px 12px rgba(0,0,0,.6);
      line-height: 1;
    }
    .pk-card span { font-size: .8rem; }
    .pk-card:nth-child(1) { top: 0; left: 0;  transform: rotate(-10deg); }
    .pk-card:nth-child(2) { top: 18px; left: 36px; transform: rotate(8deg); background: #fff9; }
    .game-card:hover .pk-card:nth-child(1) { transform: rotate(-14deg) translateX(-4px); }
    .game-card:hover .pk-card:nth-child(2) { transform: rotate(12deg) translateX(4px); }

    /* ── Badge (year) ── */
    .badge {
      position: absolute;
      top: 12px;
      right: 14px;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #000;
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: .75rem;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 1px;
      z-index: 2;
    }

    /* ── Card body ── */
    .card-body {
      width: 100%;
      padding: 20px 22px 24px;
      text-align: center;
    }
    .card-body h2 {
      font-family: 'Montserrat', sans-serif;
      font-size: 1.3rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
      text-shadow: 0 2px 8px rgba(0,0,0,.4);
    }
    .card-body p {
      font-size: .82rem;
      color: rgba(255,255,255,.7);
      margin-bottom: 18px;
      letter-spacing: .5px;
    }
    .play-btn {
      display: inline-block;
      padding: 10px 32px;
      border-radius: 50px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: .9rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #fff;
      border: 2px solid rgba(255,255,255,.7);
      background: rgba(255,255,255,.12);
      backdrop-filter: blur(4px);
      transition: background .2s, border-color .2s;
      pointer-events: none;
    }
    .game-card:hover .play-btn {
      background: rgba(255,255,255,.25);
      border-color: #fff;
    }

    /* ── Footer ── */
    .main-footer {
      position: relative;
      z-index: 1;
      margin-top: 48px;
      color: rgba(255,255,255,.25);
      font-size: .78rem;
      letter-spacing: 1px;
      text-align: center;
    }

    /* ── Pulse glow animation ── */
    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 18px rgba(255,170,0,.6)); }
      50%       { filter: drop-shadow(0 0 32px rgba(255,200,0,.9)); }
    }
    .main-header h1 { animation: pulse-glow 3s ease-in-out infinite; }

    /* ── Responsive ── */
    @media (max-width: 680px) {
      .game-grid { gap: 24px; }
      .game-card  { width: 260px; }
      .card-thumb { height: 170px; }
    }
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <header class="main-header">
    <h1>🎴 Game LAS House</h1>
    <p>Chọn trò chơi để bắt đầu</p>
  </header>

  <!-- ── Game grid ── -->
  <div class="game-grid">

    <!-- Tiến Lên Miền Nam -->
    <a class="game-card card-tienlen" href="tienlen/">
      <div class="card-thumb">
        <div class="tienlen-visual">
          <div class="tl-card red">2<span>♥</span></div>
          <div class="tl-card">2<span>♠</span></div>
          <div class="tl-card red">2<span>♦</span></div>
          <div class="tl-card">2<span>♣</span></div>
        </div>
      </div>
      <div class="card-body">
        <h2>Tiến Lên Miền Nam</h2>
        <p>2 – 4 người · Đánh bài dân gian Việt Nam</p>
        <span class="play-btn">Chơi ngay ▶</span>
      </div>
    </a>

    <!-- Poker -->
    <a class="game-card card-poker" href="poker/">
      <div class="badge">2024</div>
      <div class="card-thumb">
        <div class="poker-visual">
          <div class="pk-card">A<span>♥</span></div>
          <div class="pk-card">A<span>♦</span></div>
        </div>
      </div>
      <div class="card-body">
        <h2>Poker Định Mệnh</h2>
        <p>Tối đa 6 người · Texas Hold'em No Limit</p>
        <span class="play-btn">Chơi ngay ▶</span>
      </div>
    </a>

  </div>

  <!-- ── Footer ── -->
  <footer class="main-footer">
    <p>Game LAS House &copy; 2026 &nbsp;·&nbsp; Chỉ dành cho vui chơi nội bộ</p>
  </footer>

</body>
</html>
